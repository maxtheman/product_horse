[project]
name = "product-horse"
version = "0.1.0"
description = "Add your description here"
authors = [
    { name = "Max Caldwell", email = "max@scriptt.ai" }
]
dependencies = [
    "pydantic>=2.6.4",
    "llama-index>=0.10.20",
    "jupyterlab>=4.1.5",
    "nbdev>=2.3.13",
    "hypothesis>=6.99.9",
    "cloudflare-python>=1.0.1",
    "cloudflare>=2.19.2",
    "product-horse @ file:///Users/max/Documents/product_horse",
    "assemblyai>=0.23.1",
    "python-dotenv>=1.0.1",
    "testcontainers-postgres>=0.0.1rc1",
    "sqlmodel>=0.0.16",
    "openai>=1.14.3",
    "tiktoken>=0.6.0",
    "jsonschema>=4.21.1",
    "datasets>=2.18.0",
    "accelerate>=0.28.0",
    "llama-cpp-python>=0.2.57",
    "setuptools>=69.2.0",
    "instructor>=0.6.7",
    "anthropic>=0.21.3",
    "litellm>=1.34.5",
]
readme = "README.md"
requires-python = ">= 3.11"

[tool.rye.scripts]
prep = 'nbdev_prepare'
test = 'nbdev_test'
export = 'nbdev_export'

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = []

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["product_horse"]
